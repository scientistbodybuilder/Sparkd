<div class="app-shell" [ngClass]="{ 'sidebar-collapsed': isSidebarCollapsed }">
  <header class="app-header">
    <button class="menu-toggle" type="button" (click)="toggleSidebar()">
      ☰
    </button>
    <div class="app-title">Mock Alert Manager</div>
    <nav class="header-actions">
      <a routerLink="/login" class="header-link">Logout</a>
    </nav>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-section sidebar-brand">
        <span class="brand-mark">AM</span>
        <span class="brand-text">Alert Manager</span>
      </div>

      <nav class="sidebar-nav">
        <a
          routerLink="/dashboard"
          routerLinkActive="active"
          class="nav-item"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span class="nav-icon">📊</span>
          <span class="nav-label">Dashboard</span>
        </a>

        <a
          routerLink="/alerts"
          routerLinkActive="active"
          class="nav-item"
        >
          <span class="nav-icon">⚠️</span>
          <span class="nav-label">Alerts</span>
        </a>
      </nav>
    </aside>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
