<div class="login-page">
  <div class="login-card">
    <header class="login-header">
      <div class="logo-mark">AM</div>
      <div>
        <h1>Sign in</h1>
        <p>Access your mock alert manager workspace.</p>
      </div>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <label class="field">
        <span class="field-label">Email</span>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <span class="field-error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Enter a valid email.
        </span>
      </label>

      <label class="field">
        <span class="field-label">Password</span>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <span
          class="field-error"
          *ngIf="form.controls.password.touched && form.controls.password.invalid"
        >
          Password must be at least 6 characters.
        </span>
      </label>

      <button type="submit" class="primary-button">
        Continue
      </button>

      <p class="hint">
        This is a mock login – any valid-looking credentials will work.
      </p>
    </form>
  </div>
</div>
